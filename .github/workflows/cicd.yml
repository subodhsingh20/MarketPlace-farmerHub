name: CI/CD Pipeline with IBM Notifications

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-notify:
    runs-on: ubuntu-latest
    env:
      IBM_REGION: au-syd
      IBM_EVENT_NOTIFICATIONS_INSTANCE_ID: 4fbda1b5-313f-4452-b3a3-3230a02e631d
      IBM_EVENT_NOTIFICATIONS_API_KEY: prcuNduufLgOKB1IIVGoG7AJvh2WV4dyZjoJ9EP8wlLf

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Get IBM access token
        id: ibm_token
        shell: bash
        run: |
          response=$(curl -s -X POST "https://iam.cloud.ibm.com/identity/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -H "Accept: application/json" \
            -d "grant_type=urn:ibm:params:oauth:grant-type:apikey&apikey=${IBM_EVENT_NOTIFICATIONS_API_KEY}")
          access_token=$(echo "$response" | python -c "import sys, json; print(json.load(sys.stdin)['access_token'])")
          echo "IBM_EVENT_NOTIFICATIONS_BEARER_TOKEN=$access_token" >> "$GITHUB_ENV"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Notify Success
        if: success()
        run: |
          payload=$(cat <<EOF
          {
            "specversion": "1.0",
            "id": "${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}",
            "source": "github-actions",
            "type": "cicd.success",
            "datacontenttype": "application/json",
            "ibmensourceid": "4fbda1b5-313f-4452-b3a3-3230a02e631d:api",
            "subject": "CI/CD Pipeline Success",
            "data": {
              "repository": "${GITHUB_REPOSITORY}",
              "branch": "${GITHUB_REF_NAME}",
              "commit": "${GITHUB_SHA}",
              "message": "Workflow succeeded"
            }
          }
          EOF
          )

          curl --fail-with-body -X POST "https://${IBM_REGION}.event-notifications.cloud.ibm.com/event-notifications/v1/instances/${IBM_EVENT_NOTIFICATIONS_INSTANCE_ID}/notifications" \
            -H "Authorization: Bearer ${IBM_EVENT_NOTIFICATIONS_BEARER_TOKEN}" \
            -H "Content-Type: application/json" \
            --data-raw "$payload"

      - name: Notify Failure
        if: failure()
        run: |
          payload=$(cat <<EOF
          {
            "specversion": "1.0",
            "id": "${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}",
            "source": "github-actions",
            "type": "cicd.failure",
            "datacontenttype": "application/json",
            "ibmensourceid": "4fbda1b5-313f-4452-b3a3-3230a02e631d:api",
            "subject": "CI/CD Pipeline Failure",
            "data": {
              "repository": "${GITHUB_REPOSITORY}",
              "branch": "${GITHUB_REF_NAME}",
              "commit": "${GITHUB_SHA}",
              "message": "Workflow failed"
            }
          }
          EOF
          )

          curl --fail-with-body -X POST "https://${IBM_REGION}.event-notifications.cloud.ibm.com/event-notifications/v1/instances/${IBM_EVENT_NOTIFICATIONS_INSTANCE_ID}/notifications" \
            -H "Authorization: Bearer ${IBM_EVENT_NOTIFICATIONS_BEARER_TOKEN}" \
            -H "Content-Type: application/json" \
            --data-raw "$payload"
