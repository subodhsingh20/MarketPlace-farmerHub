services:
  backend:
    image: subodhsingh20/farmer-marketplace-backend:latest
    ports:
      - "5000:5000"
    environment:
      - CLOUDANT_URL=${CLOUDANT_URL}
      - CLOUDANT_APIKEY=${CLOUDANT_APIKEY}
      - CLOUDANT_DB_NAME=${CLOUDANT_DB_NAME:-farmer_marketplace}
      - CLIENT_URL=${CLIENT_URL}
      - JWT_SECRET=${JWT_SECRET}
      - IBM_STT_APIKEY=${IBM_STT_APIKEY}
      - IBM_STT_URL=${IBM_STT_URL}
      - PAYMENT_MODE=${PAYMENT_MODE:-test}
      - NODE_ENV=production
    networks:
      - app-network
    restart: unless-stopped

  frontend:
    image: subodhsingh20/farmer-marketplace-frontend:latest
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge
