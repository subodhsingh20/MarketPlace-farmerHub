version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - CLOUDANT_URL=${CLOUDANT_URL}
      - CLOUDANT_API_KEY=${CLOUDANT_API_KEY}
      - CLOUDANT_DB_PREFIX=${CLOUDANT_DB_PREFIX:-farmer_marketplace}
      - CLIENT_URL=${CLIENT_URL:-http://localhost:3000}
      - JWT_SECRET=${JWT_SECRET}
      - NODE_ENV=production
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:5000/api}
        REACT_APP_SOCKET_URL: ${REACT_APP_SOCKET_URL:-http://localhost:5000}
        REACT_APP_PAYMENT_MODE: ${REACT_APP_PAYMENT_MODE:-test}
        REACT_APP_RAZORPAY_KEY_ID: ${REACT_APP_RAZORPAY_KEY_ID:-}
        REACT_APP_PAYMENT_GATEWAY_URL: ${REACT_APP_PAYMENT_GATEWAY_URL:-https://checkout.razorpay.com/v1/checkout.js}
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
